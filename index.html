<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Imaginâe - Gestão de Pedidos</title>
<meta name="theme-color" content="#B76E79" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icon-192.png" />
<link rel="apple-touch-icon" href="./icon-192.png" />

<script src="https://cdn.tailwindcss.com"></script>

<!-- Import map: resolve os pacotes usados pelo app.js sem precisar de build/bundler -->
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1?external=react",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
    "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react"
  }
}
</script>

<style>
  html, body { margin: 0; padding: 0; background: #FDF8F6; }
  #root { min-height: 100vh; }
  #boot-status { display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; color:#B76E79; padding: 24px; text-align:center; }
</style>
</head>
<body>
<div id="root"><div id="boot-status">Carregando...</div></div>

<script>
  // Mostra qualquer erro de carregamento na tela em vez de travar num "Carregando..." eterno
  function showBootError(title, details) {
    var el = document.getElementById("boot-status");
    if (el) el.innerHTML = "<div style='max-width:480px;text-align:left'><b>" + title + "</b><br/><pre style='white-space:pre-wrap;font-size:12px;margin-top:8px'>" + details + "</pre></div>";
  }
  window.addEventListener("error", function (e) {
    var details = (e.error && e.error.stack) ? e.error.stack : (e.message || "Script error.");
    if (e.filename) details += "\n(" + e.filename + ":" + e.lineno + ":" + e.colno + ")";
    showBootError("Erro ao carregar o app:", details);
  }, true);
  window.addEventListener("unhandledrejection", function (e) {
    var r = e.reason;
    showBootError("Erro (promise) ao carregar o app:", (r && r.stack) ? r.stack : String(r));
  });

  // Fora do ambiente Claude não existe window.storage, então simulamos com localStorage
  window.storage = {
    async get(key) {
      const v = localStorage.getItem(key);
      if (v === null) throw new Error("key not found: " + key);
      return { key, value: v, shared: false };
    },
    async set(key, value) {
      localStorage.setItem(key, value);
      return { key, value, shared: false };
    },
    async delete(key) {
      const existed = localStorage.getItem(key) !== null;
      localStorage.removeItem(key);
      return { key, deleted: existed, shared: false };
    },
    async list(prefix) {
      const keys = Object.keys(localStorage).filter((k) => !prefix || k.startsWith(prefix));
      return { keys, prefix, shared: false };
    },
  };
</script>

<!-- App principal: JavaScript puro, já compilado (sem JSX), carregado como módulo nativo do navegador -->
<script type="module" src="./app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
