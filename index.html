<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Imaginâe - Gestão de Pedidos</title>
<meta name="theme-color" content="#B76E79" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icon-192.png" />
<link rel="apple-touch-icon" href="./icon-192.png" />

<script src="https://cdn.tailwindcss.com"></script>

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1?external=react",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
    "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react"
  }
}
</script>

<style>
  html, body { margin: 0; padding: 0; background: #FDF8F6; font-family: 'Manrope', sans-serif; }
  #root { min-height: 100vh; }
  #boot-status { display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; color:#B76E79; padding: 24px; text-align:center; }

  #login-gate { position: fixed; inset: 0; background: #FDF8F6; display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 24px; }
  #login-box { width: 100%; max-width: 340px; background: #fff; border: 1px solid #F1E3DF; border-radius: 20px; padding: 28px 24px; box-shadow: 0 8px 30px rgba(92,58,63,0.08); }
  #login-box h1 { font-size: 22px; color: #5C3A3F; margin: 0 0 4px; font-weight: 700; }
  #login-box p { font-size: 12px; color: #B76E79; text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 20px; }
  .login-input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid #EEDDD9; background: #fff; font-size: 16px; color: #3D2C2E; outline: none; margin-bottom: 10px; box-sizing: border-box; }
  .login-input:focus { border-color: #C08497; }
  #login-btn { width: 100%; padding: 13px; border-radius: 12px; border: none; color: #fff; font-weight: 600; font-size: 15px; background: linear-gradient(135deg, #C08497, #B76E79); cursor: pointer; margin-top: 6px; }
  #login-btn:disabled { opacity: 0.6; }
  #login-error { font-size: 12px; color: #9A5555; background: #F3E4E4; padding: 8px 10px; border-radius: 8px; margin-bottom: 10px; display: none; }

  #logout-fab { position: fixed; bottom: 14px; right: 14px; z-index: 500; width: 40px; height: 40px; border-radius: 999px; background: #fff; border: 1px solid #F1E3DF; box-shadow: 0 2px 10px rgba(92,58,63,0.12); display: none; align-items: center; justify-content: center; cursor: pointer; color: #B76E79; font-size: 16px; }

  #sync-toast { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); background: #5C3A3F; color: #fff; padding: 10px 16px; border-radius: 999px; font-size: 12px; z-index: 9998; display: none; box-shadow: 0 4px 14px rgba(0,0,0,0.2); }
</style>
</head>
<body>

<div id="login-gate">
  <div id="login-box">
    <h1>IMAGINÂE</h1>
    <p>Gestão de Pedidos</p>
    <div id="login-error"></div>
    <input id="login-email" class="login-input" type="email" placeholder="E-mail" autocomplete="username" />
    <input id="login-pass" class="login-input" type="password" placeholder="Senha" autocomplete="current-password" />
    <button id="login-btn">Entrar</button>
  </div>
</div>

<div id="sync-toast"></div>
<div id="logout-fab" title="Sair">⏻</div>

<div id="root"><div id="boot-status">Carregando...</div></div>

<script>
  function showBootError(title, details) {
    var el = document.getElementById("boot-status");
    if (el) el.innerHTML = "<div style='max-width:480px;text-align:left'><b>" + title + "</b><br/><pre style='white-space:pre-wrap;font-size:12px;margin-top:8px'>" + details + "</pre></div>";
  }
  window.addEventListener("error", function (e) {
    var details = (e.error && e.error.stack) ? e.error.stack : (e.message || "Script error.");
    if (e.filename) details += "\n(" + e.filename + ":" + e.lineno + ":" + e.colno + ")";
    showBootError("Erro ao carregar o app:", details);
  }, true);
  window.addEventListener("unhandledrejection", function (e) {
    var r = e.reason;
    showBootError("Erro (promise) ao carregar o app:", (r && r.stack) ? r.stack : String(r));
  });
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  // >>> TODO: troque pelos dados do SEU projeto Firebase (Console > Configurações do projeto) <<<
  const firebaseConfig = {
    apiKey: "AIzaSyDpd0JoVFUcPy-Ep66hsTpc187_2F_DI24",
    authDomain: "imaginae-37bc1.firebaseapp.com",
    projectId: "imaginae-37bc1",
    storageBucket: "imaginae-37bc1.firebasestorage.app",
    messagingSenderId: "676368164608",
    appId: "1:676368164608:web:9d5761c4ef270f4b0d75e5",
  };

  const fbApp = initializeApp(firebaseConfig);
  const auth = getAuth(fbApp);
  const db = getFirestore(fbApp);
  const DOC_REF = doc(db, "imaginae", "dados");

  const loginGate = document.getElementById("login-gate");
  const loginBtn = document.getElementById("login-btn");
  const loginEmail = document.getElementById("login-email");
  const loginPass = document.getElementById("login-pass");
  const loginError = document.getElementById("login-error");
  const logoutFab = document.getElementById("logout-fab");
  const syncToast = document.getElementById("sync-toast");

  function setLoginError(msg) {
    loginError.textContent = msg;
    loginError.style.display = msg ? "block" : "none";
  }

  loginBtn.addEventListener("click", doLogin);
  loginPass.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
  loginEmail.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });

  async function doLogin() {
    setLoginError("");
    loginBtn.disabled = true;
    loginBtn.textContent = "Entrando...";
    try {
      await signInWithEmailAndPassword(auth, loginEmail.value.trim(), loginPass.value);
    } catch (e) {
      setLoginError("E-mail ou senha incorretos.");
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = "Entrar";
    }
  }

  logoutFab.addEventListener("click", () => { signOut(auth); });

  let appStarted = false;
  let suppressNextSnapshot = false;
  let toastTimer = null;

  function showToast(msg) {
    syncToast.textContent = msg;
    syncToast.style.display = "block";
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { syncToast.style.display = "none"; }, 2500);
  }

  onAuthStateChanged(auth, (user) => {
    if (user) {
      loginGate.style.display = "none";
      logoutFab.style.display = "flex";
      if (!appStarted) startApp(user);
    } else {
      loginGate.style.display = "flex";
      logoutFab.style.display = "none";
      if (appStarted) location.reload();
    }
  });

  function startApp(user) {
    appStarted = true;

    window.storage = {
      async get(key) {
        const snap = await getDoc(DOC_REF);
        if (!snap.exists()) throw new Error("no data yet");
        const data = snap.data();
        if (!(key in data)) throw new Error("key not found: " + key);
        return { key, value: data[key], shared: true };
      },
      async set(key, value) {
        suppressNextSnapshot = true;
        await setDoc(DOC_REF, { [key]: value, _updatedBy: user.email, _updatedAt: serverTimestamp() }, { merge: true });
        return { key, value, shared: true };
      },
      async delete(key) {
        return { key, deleted: false, shared: true };
      },
      async list() {
        return { keys: [], shared: true };
      },
    };

    onSnapshot(DOC_REF, (snap) => {
      if (!snap.exists()) return;
      if (suppressNextSnapshot) { suppressNextSnapshot = false; return; }
      if (snap.metadata.hasPendingWrites) return;
      const data = snap.data();
      if (data._updatedBy && data._updatedBy !== user.email) {
        showToast("Atualizado por " + data._updatedBy + " — recarregando...");
        setTimeout(() => location.reload(), 1800);
      }
    });

    const s = document.createElement("script");
    s.type = "module";
    s.src = "./app.js";
    document.body.appendChild(s);
  }
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
